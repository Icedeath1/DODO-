<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Приёмка — Додо</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1923;--surface:#1a2535;--surface2:#243042;
  --accent:#00c896;--accent-dim:#004d38;
  --text:#e8f0f8;--text2:#7a9ab8;
  --danger:#e24b4a;--warn:#ef9f27;--border:#2a3d55;--r:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto}
.header{background:var(--surface);padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:11px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.logo span{color:var(--accent);font-weight:700}
#badge{background:var(--accent);color:#000;font-size:12px;font-weight:700;border-radius:20px;padding:3px 9px;display:none;cursor:pointer}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.search-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;padding:10px 12px 10px 36px;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text2)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.view.active{display:block}
.section-letter{font-size:11px;letter-spacing:1.5px;color:var(--text2);padding:10px 16px 4px;text-transform:uppercase;position:sticky;top:0;background:var(--bg);z-index:1}
.item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.item:active{background:var(--surface)}
.item.added{background:var(--accent-dim)}
.item-info{flex:1;min-width:0}
.item-code{font-size:10px;color:var(--text2);margin-bottom:2px;font-family:monospace}
.item-name{font-size:14px;line-height:1.35;word-break:break-word}
.item-badge{background:var(--accent);color:#000;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;margin-left:10px;white-space:nowrap;flex-shrink:0}

/* CATALOG ITEM */
.cat-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.cat-info{flex:1;min-width:0}
.cat-code{font-size:10px;color:var(--text2);font-family:monospace;margin-bottom:1px}
.cat-name{font-size:13px;line-height:1.3;word-break:break-word}
.cat-unit{font-size:11px;color:var(--accent);margin-top:2px}
.cat-actions{display:flex;gap:6px;flex-shrink:0;margin-left:10px}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn.del{color:var(--danger);border-color:var(--danger)}
.icon-btn svg{pointer-events:none}
.cat-add-bar{padding:12px 16px;border-bottom:2px solid var(--accent);background:var(--surface);position:sticky;top:0;z-index:2}
.cat-add-bar button{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--r);font-size:14px;font-weight:700;padding:11px;cursor:pointer}
.cat-count{font-size:11px;color:var(--text2);text-align:center;padding:6px;border-bottom:1px solid var(--border)}

/* INPUT PANEL */
#input-panel,#edit-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--surface);border-top:2px solid var(--accent);padding:16px;z-index:100;display:none}
.panel-title{font-size:13px;color:var(--text2);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-code{font-size:10px;color:var(--accent);font-family:monospace;margin-bottom:12px}
.input-row{display:flex;gap:10px;margin-bottom:12px}
.num-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:22px;font-weight:700;padding:10px 14px;outline:none;text-align:center;-webkit-appearance:none;appearance:none}
.num-inp:focus{border-color:var(--accent)}
.text-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;padding:10px 12px;outline:none;-webkit-appearance:none;margin-bottom:10px}
.text-inp:focus{border-color:var(--accent)}
.text-inp::placeholder{color:var(--text2)}
.label-sm{font-size:11px;color:var(--text2);margin-bottom:5px;display:block}
.unit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.unit-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;padding:9px 0;cursor:pointer;text-align:center}
.unit-btn.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:700}
.panel-actions{display:flex;gap:10px}
.btn{flex:1;border-radius:var(--r);font-size:15px;font-weight:700;padding:13px;cursor:pointer;border:none}
.btn-ok{background:var(--accent);color:#000}
.btn-del{background:var(--surface2);color:var(--danger);border:1px solid var(--danger)}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}

/* SUMMARY */
.sum-header{padding:16px;border-bottom:1px solid var(--border)}
.sum-title{font-size:18px;font-weight:700;margin-bottom:4px}
.sum-sub{font-size:12px;color:var(--text2)}
.sum-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.sum-num{font-size:11px;color:var(--text2);min-width:20px;text-align:right;margin-top:2px}
.sum-info{flex:1}.sum-code{font-size:10px;color:var(--text2);font-family:monospace;margin-bottom:2px}
.sum-name{font-size:14px;line-height:1.3}
.sum-qty{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0}
.empty{text-align:center;padding:60px 24px;color:var(--text2);font-size:15px}

#bottom-bar{padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;display:none}
.btn-copy{width:100%;background:var(--accent);color:#000;font-size:16px;font-weight:700;padding:14px;border-radius:var(--r);border:none;cursor:pointer}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:14px;font-weight:700;padding:10px 20px;border-radius:30px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

#offline-bar{display:none;background:var(--warn);color:#000;font-size:12px;font-weight:700;text-align:center;padding:6px;letter-spacing:.5px}
#install-btn{display:none;position:fixed;bottom:80px;right:16px;background:var(--accent);color:#000;border:none;border-radius:30px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;z-index:150;box-shadow:0 4px 16px rgba(0,200,150,.35)}
#install-btn:active{opacity:.85}
</style>
</head>
<body>
<div id="offline-bar">⚠ Нет соединения — работаем офлайн</div>
<button id="install-btn" onclick="installApp()">⬇ Установить приложение</button>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo"><span>ДОДО</span> · ПРИЁМКА ВЗ/РЕФ</div>
      <div id="badge" onclick="switchTab('summary')">0 ✓</div>
    </div>
    <div class="search-wrap" id="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-inp" id="search" type="search" placeholder="Поиск по названию или коду…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-list" onclick="switchTab('list')">Приёмка</div>
    <div class="tab" id="tab-summary" onclick="switchTab('summary')">Принято</div>
    <div class="tab" id="tab-catalog" onclick="switchTab('catalog')">Справочник</div>
  </div>
  <div id="list-view" class="view active"></div>
  <div id="summary-view" class="view"></div>
  <div id="catalog-view" class="view"></div>
  <div id="bottom-bar"><button class="btn-copy" onclick="copyToClipboard()">📋 Скопировать для менеджера</button></div>
</div>

<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- Приёмка: ввод количества -->
<div id="input-panel">
  <div class="panel-title" id="panel-name"></div>
  <div class="panel-code" id="panel-code"></div>
  <div class="input-row">
    <input class="num-inp" id="qty-input" type="number" inputmode="decimal" min="0" step="any" placeholder="0">
  </div>
  <div class="unit-grid" id="unit-grid"></div>
  <div class="panel-actions">
    <button class="btn btn-cancel" onclick="closeAllPanels()">Отмена</button>
    <button class="btn btn-del" id="btn-del" onclick="deleteAccepted()">Удалить</button>
    <button class="btn btn-ok" onclick="saveAccepted()">Сохранить</button>
  </div>
</div>

<!-- Справочник: редактировать/добавить позицию -->
<div id="edit-panel">
  <div style="font-size:14px;font-weight:700;margin-bottom:14px" id="edit-panel-title">Новая позиция</div>
  <label class="label-sm">Код товара (DDI_...)</label>
  <input class="text-inp" id="ep-code" placeholder="DDI_000000" autocapitalize="characters" autocomplete="off">
  <label class="label-sm">Название</label>
  <input class="text-inp" id="ep-name" placeholder="Название товара" autocomplete="off">
  <label class="label-sm">Единица по умолчанию</label>
  <div class="unit-grid" id="ep-unit-grid"></div>
  <div class="panel-actions">
    <button class="btn btn-cancel" onclick="closeAllPanels()">Отмена</button>
    <button class="btn btn-del" id="ep-btn-del" onclick="deleteCatalogItem()">Удалить</button>
    <button class="btn btn-ok" onclick="saveCatalogItem()">Сохранить</button>
  </div>
</div>

<div id="toast">Скопировано!</div>

const UNITS = ['кор','бл','шт','кг','уп','л','рол','пак'];
const LS_PRODUCTS = 'dodo_products_v2';

function loadProducts(){
  try{
    const s=localStorage.getItem(LS_PRODUCTS);
    if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length)return p;}
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
}
function saveProducts(arr){
  try{localStorage.setItem(LS_PRODUCTS,JSON.stringify(arr));}catch(e){}
}

let PRODUCTS = loadProducts();
let accepted = {};
let currentAcceptCode = null;
let acceptUnit = null;
let currentEditCode = null;
let epUnit = null;
let currentTab = 'list';
let catSearchQ = '';

function norm(s){return (s||'').toLowerCase().replace(/ё/g,'е').replace(/й/g,'и')}

/* ============ LIST / ПРИЁМКА ============ */
function buildList(filter){
  const lv = document.getElementById('list-view');
  const q = norm(filter||'');
  let html='';
  let lastL='';
  const filtered = q
    ? PRODUCTS.filter(p=>norm(p.n).includes(q)||norm(p.c).includes(q))
    : PRODUCTS;
  if(!filtered.length){
    html='<div class="empty">Ничего не найдено</div>';
  }
  filtered.forEach(p=>{
    if(!q){
      const l=p.n[0].toUpperCase();
      if(l!==lastL){html+=`<div class="section-letter">${l}</div>`;lastL=l;}
    }
    const a=accepted[p.c];
    const badge=a?`<div class="item-badge">${a.qty} ${a.u}</div>`:'';
    html+=`<div class="item${a?' added':''}" onclick="openAcceptPanel('${esc(p.c)}')">
      <div class="item-info">
        <div class="item-code">${p.c}</div>
        <div class="item-name">${p.n}</div>
      </div>${badge}
    </div>`;
  });
  lv.innerHTML=html;
}

function openAcceptPanel(code){
  currentAcceptCode=code;
  const p=PRODUCTS.find(x=>x.c===code)||{n:code,u:'кор'};
  document.getElementById('panel-name').textContent=p.n;
  document.getElementById('panel-code').textContent=code;
  const a=accepted[code];
  document.getElementById('qty-input').value=a?a.qty:'';
  acceptUnit=a?a.u:p.u;
  renderUnitBtns('unit-grid',UNITS,acceptUnit,u=>{acceptUnit=u;renderUnitBtns('unit-grid',UNITS,acceptUnit,arguments.callee);});
  document.getElementById('btn-del').style.display=a?'':'none';
  showPanel('input-panel');
  setTimeout(()=>document.getElementById('qty-input').focus(),150);
}

function saveAccepted(){
  const v=parseFloat(document.getElementById('qty-input').value);
  if(!v||v<=0){document.getElementById('qty-input').focus();return;}
  accepted[currentAcceptCode]={qty:v,u:acceptUnit||'кор'};
  closeAllPanels();
  updateBadge();
  buildList(document.getElementById('search').value);
}

function deleteAccepted(){
  delete accepted[currentAcceptCode];
  closeAllPanels();
  updateBadge();
  buildList(document.getElementById('search').value);
}

/* ============ SUMMARY ============ */
function buildSummary(){
  const sv=document.getElementById('summary-view');
  const bb=document.getElementById('bottom-bar');
  const keys=Object.keys(accepted);
  if(!keys.length){
    sv.innerHTML='<div class="empty">Пока ничего не принято.<br>Добавляйте позиции из списка.</div>';
    bb.style.display='none';return;
  }
  bb.style.display='block';
  let html=`<div class="sum-header"><div class="sum-title">Принято: ${keys.length} поз.</div><div class="sum-sub">${getDateStr()}</div></div>`;
  keys.forEach((code,i)=>{
    const p=PRODUCTS.find(x=>x.c===code)||{n:code};
    const a=accepted[code];
    html+=`<div class="sum-item">
      <div class="sum-num">${i+1}.</div>
      <div class="sum-info"><div class="sum-code">${code}</div><div class="sum-name">${p.n}</div></div>
      <div class="sum-qty">${a.qty}&nbsp;${a.u}</div>
    </div>`;
  });
  sv.innerHTML=html;
}

/* ============ CATALOG / СПРАВОЧНИК ============ */
function buildCatalog(filter){
  const cv=document.getElementById('catalog-view');
  const q=norm(filter||'');
  const filtered=q
    ?PRODUCTS.filter(p=>norm(p.n).includes(q)||norm(p.c).includes(q))
    :PRODUCTS;
  let html=`<div class="cat-add-bar"><button onclick="openEditPanel(null)">+ Добавить новую позицию</button></div>
  <div class="cat-count">${filtered.length} позиций в справочнике</div>`;
  filtered.forEach(p=>{
    html+=`<div class="cat-item">
      <div class="cat-info">
        <div class="cat-code">${p.c}</div>
        <div class="cat-name">${p.n}</div>
        <div class="cat-unit">${p.u}</div>
      </div>
      <div class="cat-actions">
        <div class="icon-btn" onclick="openEditPanel('${esc(p.c)}')" title="Редактировать">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
    </div>`;
  });
  if(!filtered.length)html+='<div class="empty">Ничего не найдено</div>';
  cv.innerHTML=html;
}

function openEditPanel(code){
  currentEditCode=code;
  const p=code?PRODUCTS.find(x=>x.c===code):null;
  document.getElementById('edit-panel-title').textContent=code?'Редактировать позицию':'Новая позиция';
  document.getElementById('ep-code').value=p?p.c:'';
  document.getElementById('ep-code').readOnly=!!code;
  document.getElementById('ep-code').style.opacity=code?'0.5':'1';
  document.getElementById('ep-name').value=p?p.n:'';
  epUnit=p?p.u:'кор';
  renderUnitBtns('ep-unit-grid',UNITS,epUnit,u=>{epUnit=u;renderUnitBtns('ep-unit-grid',UNITS,epUnit,arguments.callee);});
  document.getElementById('ep-btn-del').style.display=code?'':'none';
  showPanel('edit-panel');
  if(!code)setTimeout(()=>document.getElementById('ep-code').focus(),150);
  else setTimeout(()=>document.getElementById('ep-name').focus(),150);
}

function saveCatalogItem(){
  const code=document.getElementById('ep-code').value.trim().toUpperCase();
  const name=document.getElementById('ep-name').value.trim();
  if(!code||!name){
    if(!code)document.getElementById('ep-code').focus();
    else document.getElementById('ep-name').focus();
    return;
  }
  if(currentEditCode){
    const idx=PRODUCTS.findIndex(x=>x.c===currentEditCode);
    if(idx!==-1){PRODUCTS[idx]={c:code,n:name,u:epUnit||'кор'};}
  } else {
    if(PRODUCTS.find(x=>x.c===code)){
      document.getElementById('ep-code').style.borderColor='var(--danger)';
      document.getElementById('ep-code').focus();
      return;
    }
    PRODUCTS.push({c:code,n:name,u:epUnit||'кор'});
    PRODUCTS.sort((a,b)=>a.n.localeCompare(b.n,'ru'));
  }
  saveProducts(PRODUCTS);
  closeAllPanels();
  buildCatalog(catSearchQ);
  buildList(document.getElementById('search').value);
  showToast(currentEditCode?'Сохранено':'Добавлено');
}

function deleteCatalogItem(){
  if(!currentEditCode)return;
  if(!confirm('Удалить позицию из справочника?'))return;
  PRODUCTS=PRODUCTS.filter(x=>x.c!==currentEditCode);
  delete accepted[currentEditCode];
  saveProducts(PRODUCTS);
  closeAllPanels();
  buildCatalog(catSearchQ);
  buildList(document.getElementById('search').value);
  updateBadge();
  showToast('Удалено');
}

/* ============ SHARED ============ */
function renderUnitBtns(gridId,units,selected,onSelect){
  const g=document.getElementById(gridId);
  g.innerHTML=units.map(u=>`<button class="unit-btn${u===selected?' sel':''}" onclick="(${onSelect.toString()})('${u}')">${u}</button>`).join('');
}

function showPanel(id){
  document.getElementById(id).style.display='block';
  document.getElementById('overlay').style.display='block';
}

function closeAllPanels(){
  document.getElementById('input-panel').style.display='none';
  document.getElementById('edit-panel').style.display='none';
  document.getElementById('overlay').style.display='none';
  currentAcceptCode=null;currentEditCode=null;
}

function switchTab(tab){
  currentTab=tab;
  ['list','summary','catalog'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active':'');
    document.getElementById(t+'-view').className='view'+(t===tab?' active':'');
  });
  const sw=document.getElementById('search-wrap');
  sw.style.display=(tab==='list'||tab==='catalog')?'':'none';
  document.getElementById('search').placeholder=
    tab==='catalog'?'Поиск в справочнике…':'Поиск по названию или коду…';
  if(tab==='summary')buildSummary();
  if(tab==='catalog')buildCatalog(catSearchQ);
}

function updateBadge(){
  const n=Object.keys(accepted).length;
  const b=document.getElementById('badge');
  b.textContent=n+' ✓';
  b.style.display=n?'block':'none';
}

function getDateStr(){
  const d=new Date();
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})
    +' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function copyToClipboard(){
  const keys=Object.keys(accepted);
  if(!keys.length)return;
  let txt='ПРИЁМКА ВЗ/РЕФ — '+getDateStr()+'\n'+'─'.repeat(38)+'\n';
  keys.forEach((code,i)=>{
    const p=PRODUCTS.find(x=>x.c===code)||{n:code};
    const a=accepted[code];
    txt+=`${i+1}. ${code}\n   ${p.n}\n   → ${a.qty} ${a.u}\n`;
  });
  txt+='─'.repeat(38)+'\nВсего позиций: '+keys.length;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>showToast('Скопировано!')).catch(()=>fallbackCopy(txt));
  }else{fallbackCopy(txt);}
}

function fallbackCopy(txt){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('Скопировано!');}catch(e){}
  document.body.removeChild(ta);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function esc(s){return (s||'').replace(/'/g,"\\'");}

document.getElementById('search').addEventListener('input',function(){
  const q=this.value;
  if(currentTab==='list')buildList(q);
  else if(currentTab==='catalog'){catSearchQ=q;buildCatalog(q);}
});
document.getElementById('qty-input').addEventListener('keydown',function(e){if(e.key==='Enter')saveAccepted();});
document.getElementById('ep-name').addEventListener('keydown',function(e){if(e.key==='Enter')saveCatalogItem();});

buildList('');
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error',e));
  });
}

window.addEventListener('online', ()=>{
  document.getElementById('offline-bar').style.display='none';
});
window.addEventListener('offline', ()=>{
  document.getElementById('offline-bar').style.display='block';
});
if(!navigator.onLine){
  document.getElementById('offline-bar').style.display='block';
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-btn').style.display='block';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-btn').style.display='none';
  deferredPrompt=null;
  showToast('Приложение установлено!');
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt=null;
      document.getElementById('install-btn').style.display='none';
    });
  }
}
</script>
